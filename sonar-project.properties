# SonarQube Cloud project configuration.
#
# ┌─────────────────────────────────────────────────────────────────────────┐
# │ VERIFY THESE TWO VALUES against your SonarQube Cloud project.            │
# │ Open the project on sonarcloud.io → "Information" (ⓘ) panel shows the    │
# │ Project Key; your Organization settings show the Organization Key.      │
# │ If they don't match, analysis fails with "project not found" /          │
# │ "not authorized". The values below are the usual GitHub-import defaults. │
# └─────────────────────────────────────────────────────────────────────────┘
sonar.projectKey=tape-stop_tape-stop
sonar.organization=tape-stop

# Cosmetic: how the project shows up in the SonarQube Cloud UI.
sonar.projectName=Tape Stop
sonar.projectVersion=0.1.0

# What to analyze. Production code vs test code are separated so issues are
# weighted correctly. JUCE is fetched into build/_deps (outside these paths),
# so the framework is excluded from analysis automatically.
sonar.sources=Source
sonar.tests=Tests

sonar.sourceEncoding=UTF-8

# Test coverage for the DSP core, generated by CI with gcovr (--sonarqube). The
# report is produced during the workflow run and is not committed to the repo.
sonar.coverageReportPaths=coverage.xml

# Coverage scope. The headless unit tests (Tests/) exercise the DSP core
# (TapeStopEngine.h) only; the editor, look-and-feel and the host wrapper are
# GUI / plugin plumbing that can't be driven without a window or a host, so they
# are validated by pluginval in build.yml rather than by unit tests. Excluding
# them from the COVERAGE metric keeps the "new code" coverage gate honest
# (measuring the code the tests actually cover) instead of failing every
# GUI-heavy PR. These files are still fully analysed for bugs and code smells --
# this only removes them from the coverage denominator.
sonar.coverage.exclusions=Source/PluginEditor.cpp,Source/PluginEditor.h,Source/PluginProcessor.cpp,Source/PluginProcessor.h,Source/TapeStopLookAndFeel.cpp,Source/TapeStopLookAndFeel.h

# Intentional rule exception. S8417 wants std::memory_order_seq_cst on every
# atomic op. TapeStopEngine publishes two independent scalar snapshots
# (speed / phase) once per block for the UI to read; there is no cross-variable
# ordering invariant, so relaxed ordering is correct here and seq_cst would only
# add needless fences on the real-time audio thread. Ignore S8417 in the engine.
sonar.issue.ignore.multicriteria=relaxedAtomics
sonar.issue.ignore.multicriteria.relaxedAtomics.ruleKey=cpp:S8417
sonar.issue.ignore.multicriteria.relaxedAtomics.resourceKey=Source/TapeStopEngine.h

# The Quality Gate is applied per-event in .github/workflows/sonarqube.yml:
# it blocks pull requests (Clean as You Code) but does NOT fail the post-merge
# analysis of dev. The first branch analysis scores the whole existing codebase
# as "new code", so gating there would red-flag CI for code already merged.

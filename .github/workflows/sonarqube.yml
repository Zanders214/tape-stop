name: SonarQube Cloud

# C/C++ is not supported by SonarQube Cloud's "Automatic Analysis" — it must be
# analyzed in CI from a compilation database. We let CMake emit one
# (CMAKE_EXPORT_COMPILE_COMMANDS) and point the scanner at it, so SonarQube sees
# the exact compiler flags / include paths used to build the plugin.

on:
  push:
    branches:
      - dev
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # Full history so SonarQube can attribute issues to the right commits.
          fetch-depth: 0

      # Same build dependencies as build.yml — JUCE's GUI/audio modules need
      # these dev headers to compile.
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libfreetype-dev libfontconfig1-dev \
            libx11-dev libxcomposite-dev libxcursor-dev libxext-dev \
            libxinerama-dev libxrandr-dev libxrender-dev \
            libglu1-mesa-dev mesa-common-dev

      # Reuse build.yml's JUCE clone cache to avoid re-fetching the framework.
      - name: Cache JUCE
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: juce-${{ runner.os }}-8.0.4

      # Generate the compilation database and build, so JUCE's generated headers
      # exist before the scanner parses our sources.
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build
        run: cmake --build build --config Release --parallel

      # On pull requests, wait for the Quality Gate and fail the check if it is
      # red — this enforces quality on new code before it merges. On pushes to
      # dev we still publish the analysis but do NOT gate: the first branch
      # analysis scores the entire existing codebase as "new code", so gating
      # there would fail CI on already-merged code (e.g. 0% coverage on the GUI
      # classes that aren't unit-tested).
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            --define sonar.cfamily.compile-commands=build/compile_commands.json
            ${{ github.event_name == 'pull_request' && '--define sonar.qualitygate.wait=true' || '' }}

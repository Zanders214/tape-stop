name: Build

on:
  push:
    # Only build the integration branches on push. Feature branches are covered
    # by the pull_request trigger below, which avoids both throwaway WIP builds
    # and the duplicate push+PR build of the same commit.
    branches: [dev, main]
  pull_request:
  workflow_dispatch:

# A newer commit on the same branch/PR cancels an in-flight build for that ref,
# so two builds never race for the same thing.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
          - name: Windows
            os: windows-latest
          - name: macOS
            os: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libfreetype-dev libfontconfig1-dev \
            libx11-dev libxcomposite-dev libxcursor-dev libxext-dev \
            libxinerama-dev libxrandr-dev libxrender-dev \
            libglu1-mesa-dev mesa-common-dev ninja-build xvfb

      # Cache the FetchContent JUCE clone to speed up subsequent builds.
      - name: Cache JUCE
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: juce-${{ runner.os }}-8.0.4

      - name: Configure
        shell: bash
        run: |
          EXTRA=""
          if [ "${{ runner.os }}" = "macOS" ]; then
            EXTRA="-DCMAKE_OSX_ARCHITECTURES=arm64;x86_64"
          fi
          cmake -B build -DCMAKE_BUILD_TYPE=Release $EXTRA

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Run unit tests
        run: ctest --test-dir build --build-config Release --output-on-failure

      - name: Run pluginval
        shell: bash
        run: |
          set -e
          VST3=$(find build -name "Tape Stop.vst3" -print -quit)
          echo "Validating: $VST3"

          case "${{ runner.os }}" in
            Linux)
              curl -L -o pluginval.zip https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_Linux.zip
              unzip -o pluginval.zip
              # The Linux runner is headless; run under a virtual display so the
              # editor-related pluginval tests can open a window.
              xvfb-run -a ./pluginval --strictness-level 5 --validate "$VST3"
              ;;
            macOS)
              curl -L -o pluginval.zip https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_macOS.zip
              unzip -o pluginval.zip
              ./pluginval.app/Contents/MacOS/pluginval --strictness-level 5 --validate "$VST3"
              ;;
            Windows)
              curl -L -o pluginval.zip https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_Windows.zip
              unzip -o pluginval.zip
              ./pluginval.exe --strictness-level 5 --validate "$VST3"
              ;;
          esac

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TapeStop-${{ matrix.name }}
          path: |
            build/TapeStop_artefacts/Release/VST3/*.vst3
            build/TapeStop_artefacts/Release/AU/*.component
          if-no-files-found: warn

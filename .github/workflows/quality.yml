name: Performance Gates

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  # ---------------------------------------------------------------------------
  # Real-time safety: run the audio-thread DSP under clang RealtimeSanitizer.
  # Fails if processBlock's annotated path allocates, locks, or syscalls.
  # ---------------------------------------------------------------------------
  rtsan:
    name: RealtimeSanitizer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: JUCE Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libasound2-dev libjack-jackd2-dev libcurl4-openssl-dev \
            libfreetype-dev libfontconfig1-dev libx11-dev libxcomposite-dev libxcursor-dev \
            libxext-dev libxinerama-dev libxrandr-dev libxrender-dev libglu1-mesa-dev mesa-common-dev

      - name: Install clang 20 (RealtimeSanitizer)
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 20

      - uses: lukka/get-cmake@latest

      - name: Configure
        run: >
          cmake -B build-rt -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo
          -DCMAKE_C_COMPILER=clang-20 -DCMAKE_CXX_COMPILER=clang++-20
          -DTAPESTOP_RT_SANITIZE=ON

      - name: Build rt_check
        run: cmake --build build-rt --target rt_check --parallel

      - name: Run under RTSan
        env:
          RTSAN_OPTIONS: "halt_on_error=1:suppressions=${{ github.workspace }}/Tests/rtsan_suppressions.txt"
        # ScopedJuceInitialiser_GUI needs a display even headless; JUCE nests the
        # binary under <target>_artefacts/<config>/ — discover it, don't hardcode.
        run: |
          BIN=$(find build-rt -type f -name rt_check -path '*_artefacts*' | head -1)
          xvfb-run -a "$BIN"

  # ---------------------------------------------------------------------------
  # Host-contract validation: a pinned, in-process pluginval gate. Stricter and
  # more reproducible than the smoke-check in build.yml (pinned version,
  # --validate-in-process, explicit timeout).
  # ---------------------------------------------------------------------------
  pluginval:
    name: pluginval (strict, in-process)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: JUCE Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libasound2-dev libjack-jackd2-dev libcurl4-openssl-dev \
            libfreetype-dev libfontconfig1-dev libx11-dev libxcomposite-dev libxcursor-dev \
            libxext-dev libxinerama-dev libxrandr-dev libxrender-dev libglu1-mesa-dev mesa-common-dev

      - uses: lukka/get-cmake@latest

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build VST3
        run: cmake --build build --target TapeStop_VST3 --parallel

      - name: pluginval
        run: |
          curl -L -o pluginval.zip https://github.com/Tracktion/pluginval/releases/download/v1.0.4/pluginval_Linux.zip
          unzip -o pluginval.zip && chmod +x pluginval
          VST3=$(find build -name '*.vst3' -path '*_artefacts*' | head -1)
          xvfb-run -a ./pluginval --strictness-level 5 --validate-in-process --timeout-ms 300000 "$VST3"
